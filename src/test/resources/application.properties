# 1. Database (Clean slate for every test run)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# 2. Modulith & SQL Init (Ensures event tables are created in H2)
spring.sql.init.mode=always
spring.modulith.republish-outstanding-events-on-restart=true

# 3. Docker (Disable completely for tests to keep them fast)
spring.docker.compose.enabled=false
